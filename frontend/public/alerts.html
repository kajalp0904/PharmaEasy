<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om Medical - Alerts (React)</title>
    <link rel="stylesheet" href="css/alerts.css">
</head>
<body>
    <div class="container">
        <!-- SIDEBAR (stays static HTML - no need for React here) -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <h1>Om Medical</h1>
            </div>
            <nav>
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="medicines.html" class="nav-item">All Medicines</a>
                <a href="add-medicine.html" class="nav-item">Add Medicine</a>
                <a href="generate-bill.html" class="nav-item">Generate Bill</a>
                <a href="billing-history.html" class="nav-item">Billing History</a>
                <a href="alerts.html" class="nav-item active">Alerts</a>
            </nav>
        </div>

        <!-- MAIN CONTENT - REACT MOUNTS HERE -->
        <div class="main-content">
            <div id="react-alerts-root"></div>
        </div>
    </div>

    <!-- Load api.js first for auth & apiCall -->
    <script src="js/api.js"></script>

    <!-- ==================== VANILLA JS APP ==================== -->
    <script>
        requireAuth();
        
        let alertsData = { lowStock: [], expiringSoon: [], expired: [] };
        let counts = { lowStock: 0, expiringSoon: 0, expired: 0 };
        let activeTab = 'lowStock';
        let lastUpdated = null;
        let isRefreshing = false;
        
        const rootItem = document.getElementById('react-alerts-root');
        
        function renderHeader() {
            return `
                <div class="header">
                    <h2>Alerts & Notifications</h2>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        ${lastUpdated ? `<span style="font-size: 12px; color: #999;">Updated: ${lastUpdated.toLocaleTimeString()}</span>` : ''}
                        <button class="refresh-btn" onclick="fetchAlerts()" ${isRefreshing ? 'disabled' : ''}>
                            ${isRefreshing ? '⏳ Loading...' : '🔄 Refresh'}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderTabs() {
            const tabs = [
                { key: 'lowStock', label: 'Low Stock' },
                { key: 'expiringSoon', label: 'Expiring Soon' },
                { key: 'expired', label: 'Expired' }
            ];
            
            let html = '<div class="tabs">';
            tabs.forEach(tab => {
                const isActive = activeTab === tab.key;
                const tabClass = isActive ? 'tab-btn active' : 'tab-btn';
                const badgeHtml = `<span style="display: inline-block; padding: 2px 10px; background-color: #ff6b35; color: white; border-radius: 12px; font-size: 13px; font-weight: 700; min-width: 24px; text-align: center;">${counts[tab.key] || 0}</span>`;
                
                html += `<button class="${tabClass}" onclick="switchTab('${tab.key}')">${tab.label} ${badgeHtml}</button>`;
            });
            html += '</div>';
            return html;
        }

        function renderAlertsList() {
            const alerts = alertsData[activeTab] || [];
            if (alerts.length === 0) {
                const labels = { lowStock: 'low stock', expiringSoon: 'expiring', expired: 'expired' };
                return `
                    <div class="empty-state">
                        <div class="empty-state-icon">✅</div>
                        <div class="empty-state-title">No ${labels[activeTab]} alerts</div>
                        <div class="empty-state-text">Everything looks good!</div>
                    </div>
                `;
            }
            
            let html = '<div class="alert-list">';
            alerts.forEach(alert => {
                if (activeTab === 'lowStock') {
                    html += `
                        <div class="alert-card low-stock">
                            <div class="alert-icon">⚠️</div>
                            <div class="alert-content">
                                <div class="alert-title">${alert.medicine}</div>
                                <div class="alert-details">
                                    <span>Batch: ${alert.batchNumber}</span>
                                    <span>Location: ${alert.location}</span>
                                    <span>Current: ${alert.currentQuantity} units</span>
                                    <span>Minimum: ${alert.minimumStock} units</span>
                                </div>
                                <div class="alert-deficit">Deficit: ${alert.deficit} units</div>
                            </div>
                        </div>
                    `;
                } else if (activeTab === 'expiringSoon') {
                    const expiryDate = new Date(alert.expiryDate).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                    html += `
                        <div class="alert-card expiring-soon">
                            <div class="alert-icon">⏰</div>
                            <div class="alert-content">
                                <div class="alert-title">${alert.medicine}</div>
                                <div class="alert-details">
                                    <span>Batch: ${alert.batchNumber}</span>
                                    <span>Location: ${alert.location}</span>
                                    <span>Quantity: ${alert.quantity} units</span>
                                    <span>Expiry: ${expiryDate}</span>
                                </div>
                                <div class="alert-days">${alert.daysLeft} day${alert.daysLeft !== 1 ? 's' : ''} remaining</div>
                            </div>
                        </div>
                    `;
                } else if (activeTab === 'expired') {
                    const expiryDate = new Date(alert.expiryDate).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                    html += `
                        <div class="alert-card expired">
                            <div class="alert-icon">❌</div>
                            <div class="alert-content">
                                <div class="alert-title">${alert.medicine}</div>
                                <div class="alert-details">
                                    <span>Batch: ${alert.batchNumber}</span>
                                    <span>Location: ${alert.location}</span>
                                    <span>Quantity: ${alert.quantity} units</span>
                                    <span>Expired: ${expiryDate}</span>
                                </div>
                                <div class="alert-expired">${alert.daysExpired} day${alert.daysExpired !== 1 ? 's' : ''} ago</div>
                            </div>
                        </div>
                    `;
                }
            });
            html += '</div>';
            return html;
        }

        function renderFooter() {
            if (!lastUpdated) return '';
            const total = counts.lowStock + counts.expiringSoon + counts.expired;
            return `
                <div style="margin-top: 20px; padding: 16px 20px; background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); display: flex; justify-content: space-between; font-size: 14px; color: #7a7a7a;">
                    <span>Total Alerts: ${total}</span>
                </div>
            `;
        }

        function renderUI() {
            rootItem.innerHTML = renderHeader() + renderTabs() + renderAlertsList() + renderFooter();
        }

        window.switchTab = function(tabName) {
            activeTab = tabName;
            renderUI();
        }

        window.fetchAlerts = async function() {
            isRefreshing = true;
            renderUI();
            
            try {
                const response = await apiCall('/alerts', { method: 'GET' });
                if (response && response.alerts) {
                    alertsData = response.alerts;
                    counts = response.counts;
                    lastUpdated = new Date();
                }
            } catch (error) {
                console.error('Error loading alerts:', error);
            } finally {
                isRefreshing = false;
                renderUI();
            }
        }
        
        // Initial load
        rootItem.innerHTML = '<div class="loading">⏳ Loading alerts...</div>';
        fetchAlerts();
    </script>
</body>
</html>
