<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om Medical - Alerts (React)</title>
    <link rel="stylesheet" href="css/alerts.css">
</head>
<body>
    <div class="container">
        <!-- SIDEBAR (stays static HTML - no need for React here) -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <h1>Om Medical</h1>
            </div>
            <nav>
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="medicines.html" class="nav-item">All Medicines</a>
                <a href="add-medicine.html" class="nav-item">Add Medicine</a>
                <a href="generate-bill.html" class="nav-item">Generate Bill</a>
                <a href="billing-history.html" class="nav-item">Billing History</a>
                <a href="alerts.html" class="nav-item active">Alerts</a>
            </nav>
        </div>

        <!-- MAIN CONTENT - REACT MOUNTS HERE -->
        <div class="main-content">
            <div id="react-alerts-root"></div>
        </div>
    </div>

    <!-- Load api.js first for auth & apiCall -->
    <script src="js/api.js"></script>

    <!-- React 18 via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ==================== REACT COMPONENTS ==================== -->
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // ==================== Badge Component ====================
        function Badge({ count, color = '#ff6b35' }) {
            return (
                <span style={{
                    display: 'inline-block',
                    padding: '2px 10px',
                    backgroundColor: color,
                    color: 'white',
                    borderRadius: '12px',
                    fontSize: '13px',
                    fontWeight: 700,
                    minWidth: '24px',
                    textAlign: 'center'
                }}>
                    {count}
                </span>
            );
        }

        // ==================== Tab Button Component ====================
        function TabButton({ label, count, isActive, onClick }) {
            return (
                <button
                    className={`tab-btn ${isActive ? 'active' : ''}`}
                    onClick={onClick}
                >
                    {label} <Badge count={count} />
                </button>
            );
        }

        // ==================== Low Stock Alert Card ====================
        function LowStockCard({ alert }) {
            return (
                <div className="alert-card low-stock">
                    <div className="alert-icon">⚠️</div>
                    <div className="alert-content">
                        <div className="alert-title">{alert.medicine}</div>
                        <div className="alert-details">
                            <span>Batch: {alert.batchNumber}</span>
                            <span>Location: {alert.location}</span>
                            <span>Current: {alert.currentQuantity} units</span>
                            <span>Minimum: {alert.minimumStock} units</span>
                        </div>
                        <div className="alert-deficit">Deficit: {alert.deficit} units</div>
                    </div>
                </div>
            );
        }

        // ==================== Expiring Soon Alert Card ====================
        function ExpiringSoonCard({ alert }) {
            const expiryDate = new Date(alert.expiryDate).toLocaleDateString('en-GB', {
                day: '2-digit', month: 'short', year: 'numeric'
            });

            return (
                <div className="alert-card expiring-soon">
                    <div className="alert-icon">⏰</div>
                    <div className="alert-content">
                        <div className="alert-title">{alert.medicine}</div>
                        <div className="alert-details">
                            <span>Batch: {alert.batchNumber}</span>
                            <span>Location: {alert.location}</span>
                            <span>Quantity: {alert.quantity} units</span>
                            <span>Expiry: {expiryDate}</span>
                        </div>
                        <div className="alert-days">
                            {alert.daysLeft} day{alert.daysLeft !== 1 ? 's' : ''} remaining
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== Expired Alert Card ====================
        function ExpiredCard({ alert }) {
            const expiryDate = new Date(alert.expiryDate).toLocaleDateString('en-GB', {
                day: '2-digit', month: 'short', year: 'numeric'
            });

            return (
                <div className="alert-card expired">
                    <div className="alert-icon">❌</div>
                    <div className="alert-content">
                        <div className="alert-title">{alert.medicine}</div>
                        <div className="alert-details">
                            <span>Batch: {alert.batchNumber}</span>
                            <span>Location: {alert.location}</span>
                            <span>Quantity: {alert.quantity} units</span>
                            <span>Expired: {expiryDate}</span>
                        </div>
                        <div className="alert-expired">
                            {alert.daysExpired} day{alert.daysExpired !== 1 ? 's' : ''} ago
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== Empty State Component ====================
        function EmptyState({ tabName }) {
            const labels = {
                lowStock: 'low stock',
                expiringSoon: 'expiring',
                expired: 'expired'
            };

            return (
                <div className="empty-state">
                    <div className="empty-state-icon">✅</div>
                    <div className="empty-state-title">No {labels[tabName]} alerts</div>
                    <div className="empty-state-text">Everything looks good!</div>
                </div>
            );
        }

        // ==================== Loading Spinner Component ====================
        function LoadingSpinner() {
            return <div className="loading">⏳ Loading alerts...</div>;
        }

        // ==================== Alert List Component ====================
        function AlertList({ alerts, tabName, isLoading }) {
            if (isLoading) return <LoadingSpinner />;
            if (!alerts || alerts.length === 0) return <EmptyState tabName={tabName} />;

            return (
                <div className="alert-list">
                    {alerts.map((alert, index) => {
                        switch (tabName) {
                            case 'lowStock':
                                return <LowStockCard key={alert.batchId || index} alert={alert} />;
                            case 'expiringSoon':
                                return <ExpiringSoonCard key={alert.batchId || index} alert={alert} />;
                            case 'expired':
                                return <ExpiredCard key={alert.batchId || index} alert={alert} />;
                            default:
                                return null;
                        }
                    })}
                </div>
            );
        }

        // ==================== MAIN APP COMPONENT ====================
        function AlertsApp() {
            // React State Management
            const [activeTab, setActiveTab] = useState('lowStock');
            const [alertsData, setAlertsData] = useState(null);
            const [counts, setCounts] = useState({ lowStock: 0, expiringSoon: 0, expired: 0 });
            const [isLoading, setIsLoading] = useState(true);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [lastUpdated, setLastUpdated] = useState(null);

            // Fetch alerts from API using useCallback
            const fetchAlerts = useCallback(async () => {
                setIsRefreshing(true);
                try {
                    const response = await apiCall('/alerts', { method: 'GET' });
                    setAlertsData(response.alerts);
                    setCounts(response.counts);
                    setLastUpdated(new Date());
                } catch (error) {
                    console.error('Error loading alerts:', error);
                } finally {
                    setIsLoading(false);
                    setIsRefreshing(false);
                }
            }, []);

            // useEffect - load alerts when component mounts
            useEffect(() => {
                fetchAlerts();
            }, [fetchAlerts]);

            // Tab configuration using array map pattern
            const tabs = [
                { key: 'lowStock', label: 'Low Stock' },
                { key: 'expiringSoon', label: 'Expiring Soon' },
                { key: 'expired', label: 'Expired' }
            ];

            return (
                <React.Fragment>
                    {/* Header */}
                    <div className="header">
                        <h2>Alerts & Notifications</h2>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            {lastUpdated && (
                                <span style={{ fontSize: '12px', color: '#999' }}>
                                    Updated: {lastUpdated.toLocaleTimeString()}
                                </span>
                            )}
                            <button
                                className="refresh-btn"
                                onClick={fetchAlerts}
                                disabled={isRefreshing}
                            >
                                {isRefreshing ? '⏳ Loading...' : '🔄 Refresh'}
                            </button>
                        </div>
                    </div>

                    {/* Tabs - rendered with .map() */}
                    <div className="tabs">
                        {tabs.map(tab => (
                            <TabButton
                                key={tab.key}
                                label={tab.label}
                                count={counts[tab.key]}
                                isActive={activeTab === tab.key}
                                onClick={() => setActiveTab(tab.key)}
                            />
                        ))}
                    </div>

                    {/* Active Tab Content - conditional rendering */}
                    <AlertList
                        alerts={alertsData ? alertsData[activeTab] : []}
                        tabName={activeTab}
                        isLoading={isLoading}
                    />

                    {/* Summary footer */}
                    {alertsData && (
                        <div style={{
                            marginTop: '20px',
                            padding: '16px 20px',
                            background: 'white',
                            borderRadius: '8px',
                            boxShadow: '0 2px 6px rgba(0,0,0,0.06)',
                            display: 'flex',
                            justifyContent: 'space-between',
                            fontSize: '14px',
                            color: '#7a7a7a'
                        }}>
                            <span>Total Alerts: {counts.lowStock + counts.expiringSoon + counts.expired}</span>
                            <span>⚛️ Powered by React {React.version}</span>
                        </div>
                    )}
                </React.Fragment>
            );
        }

        // ==================== MOUNT REACT APP ====================
        requireAuth();
        const root = ReactDOM.createRoot(document.getElementById('react-alerts-root'));
        root.render(<AlertsApp />);
    </script>
</body>
</html>
