<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om Medical - Alerts</title>
    <link rel="stylesheet" href="css/alerts.css">
</head>
<body>
    <div class="container">
        <!-- SIDEBAR (DARK) -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <h1>Om Medical</h1>
            </div>
            <nav>
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="medicines.html" class="nav-item">All Medicines</a>
                <a href="add-medicine.html" class="nav-item">Add Medicine</a>
                <a href="generate-bill.html" class="nav-item">Generate Bill</a>
                <a href="billing-history.html" class="nav-item">Billing History</a>
                <a href="alerts.html" class="nav-item active">Alerts</a>
                
            </nav>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="header">
                <h2>Alerts & Notifications</h2>
                <button class="refresh-btn" id="refreshBtn" onclick="loadAlerts()">
                    🔄 Refresh
                </button>
            </div>

            <!-- TABS -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="lowStock">
                    Low Stock <span class="badge" id="lowStockBadge">0</span>
                </button>
                <button class="tab-btn" data-tab="expiringSoon">
                    Expiring Soon <span class="badge" id="expiringSoonBadge">0</span>
                </button>
                <button class="tab-btn" data-tab="expired">
                    Expired <span class="badge" id="expiredBadge">0</span>
                </button>
            </div>

            <!-- TAB CONTENT -->
            <div class="tab-content active" id="lowStockTab">
                <div class="alert-list" id="lowStockList">
                    <div class="loading">Loading alerts...</div>
                </div>
            </div>

            <div class="tab-content" id="expiringSoonTab">
                <div class="alert-list" id="expiringSoonList">
                    <div class="loading">Loading alerts...</div>
                </div>
            </div>

            <div class="tab-content" id="expiredTab">
                <div class="alert-list" id="expiredList">
                    <div class="loading">Loading alerts...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Check authentication on page load
        requireAuth();

        let alertsData = null;

        // ========== LOAD ALERTS FROM BACKEND ==========
        async function loadAlerts() {
            try {
                const refreshBtn = document.getElementById('refreshBtn');
                refreshBtn.disabled = true;
                refreshBtn.textContent = '⏳ Loading...';

                const response = await apiCall('/alerts', { method: 'GET' });
                alertsData = response.alerts;

                // Update badges
                document.getElementById('lowStockBadge').textContent = response.counts.lowStock;
                document.getElementById('expiringSoonBadge').textContent = response.counts.expiringSoon;
                document.getElementById('expiredBadge').textContent = response.counts.expired;

                // Render current tab
                const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
                renderAlerts(activeTab);

                refreshBtn.disabled = false;
                refreshBtn.textContent = '🔄 Refresh';
                showNotification('Alerts refreshed successfully', 'success');

            } catch (error) {
                console.error('Error loading alerts:', error);
                showNotification('Failed to load alerts', 'error');
                document.getElementById('refreshBtn').disabled = false;
                document.getElementById('refreshBtn').textContent = '🔄 Refresh';
            }
        }

        // ========== RENDER ALERTS FOR SPECIFIC TAB ==========
        function renderAlerts(tabName) {
            const listId = `${tabName}List`;
            const listElement = document.getElementById(listId);

            if (!alertsData) {
                listElement.innerHTML = '<div class="loading">Loading alerts...</div>';
                return;
            }

            const alerts = alertsData[tabName] || [];

            if (alerts.length === 0) {
                listElement.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✅</div>
                        <div class="empty-state-title">No ${tabName === 'lowStock' ? 'low stock' : tabName === 'expiringSoon' ? 'expiring' : 'expired'} alerts</div>
                        <div class="empty-state-text">Everything looks good!</div>
                    </div>
                `;
                return;
            }

            // Render alerts based on type
            let html = '';
            alerts.forEach(alert => {
                if (tabName === 'lowStock') {
                    html += renderLowStockAlert(alert);
                } else if (tabName === 'expiringSoon') {
                    html += renderExpiringSoonAlert(alert);
                } else if (tabName === 'expired') {
                    html += renderExpiredAlert(alert);
                }
            });

            listElement.innerHTML = html;
        }

        // ========== RENDER LOW STOCK ALERT ==========
        function renderLowStockAlert(alert) {
            return `
                <div class="alert-card low-stock">
                    <div class="alert-icon">⚠️</div>
                    <div class="alert-content">
                        <div class="alert-title">${alert.medicine}</div>
                        <div class="alert-details">
                            <span>Batch: ${alert.batchNumber}</span>
                            <span>Location: ${alert.location}</span>
                            <span>Current: ${alert.currentQuantity} units</span>
                            <span>Minimum: ${alert.minimumStock} units</span>
                        </div>
                        <div class="alert-deficit">Deficit: ${alert.deficit} units</div>
                    </div>
                </div>
            `;
        }

        // ========== RENDER EXPIRING SOON ALERT ==========
        function renderExpiringSoonAlert(alert) {
            const expiryDate = new Date(alert.expiryDate).toLocaleDateString('en-GB', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });

            return `
                <div class="alert-card expiring-soon">
                    <div class="alert-icon">⏰</div>
                    <div class="alert-content">
                        <div class="alert-title">${alert.medicine}</div>
                        <div class="alert-details">
                            <span>Batch: ${alert.batchNumber}</span>
                            <span>Location: ${alert.location}</span>
                            <span>Quantity: ${alert.quantity} units</span>
                            <span>Expiry: ${expiryDate}</span>
                        </div>
                        <div class="alert-days">${alert.daysLeft} day${alert.daysLeft !== 1 ? 's' : ''} remaining</div>
                    </div>
                </div>
            `;
        }

        // ========== RENDER EXPIRED ALERT ==========
        function renderExpiredAlert(alert) {
            const expiryDate = new Date(alert.expiryDate).toLocaleDateString('en-GB', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });

            return `
                <div class="alert-card expired">
                    <div class="alert-icon">❌</div>
                    <div class="alert-content">
                        <div class="alert-title">${alert.medicine}</div>
                        <div class="alert-details">
                            <span>Batch: ${alert.batchNumber}</span>
                            <span>Location: ${alert.location}</span>
                            <span>Quantity: ${alert.quantity} units</span>
                            <span>Expired: ${expiryDate}</span>
                        </div>
                        <div class="alert-expired">${alert.daysExpired} day${alert.daysExpired !== 1 ? 's' : ''} ago</div>
                    </div>
                </div>
            `;
        }

        // ========== TAB SWITCHING ==========
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Remove active class from all tabs and content
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                // Add active class to clicked tab
                this.classList.add('active');
                const tabName = this.dataset.tab;
                document.getElementById(`${tabName}Tab`).classList.add('active');

                // Render alerts for this tab
                renderAlerts(tabName);
            });
        });

        // Load alerts on page load
        window.addEventListener('DOMContentLoaded', loadAlerts);
    </script>
</body>
</html>
